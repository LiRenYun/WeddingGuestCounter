<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仁雲&銳芝 Wedding 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💖</text></svg>">
</head>

<body>
    <div id="heart-container"></div>

    <div class="lang-toggle-wrapper">
        <button id="btn-lang" class="pixel-btn sm">切換語言 / 言語切替</button>
    </div>

    <main class="game-box">

        <section id="sec-home" class="view-section">
            <h1 class="title" data-i18n="title">💍 仁雲&銳芝💌我們的婚禮 💍</h1>
            <p class="subtitle" data-i18n="subtitle">2026.11.29(日) 歡迎來到新手村</p>

            <div class="menu-buttons">
                <button class="pixel-btn primary nav-btn" data-target="sec-rsvp" data-i18n="btn_rsvp">📝 報名參加</button>
                <button class="pixel-btn secondary nav-btn" data-target="sec-info" data-i18n="btn_info">🗺️
                    婚宴資訊</button>
                <button class="pixel-btn nav-btn" data-target="sec-wishes" data-i18n="btn_wishes"
                    style="background-color: #ff9fb2;">💌 想對新人說的話</button>
                <button class="pixel-btn accent nav-btn" data-target="sec-photos" data-i18n="btn_photos">📷
                    婚紗特集</button>
            </div>
        </section>

        <section id="sec-rsvp" class="view-section hidden">
            <h2 data-i18n="title_rsvp">📝 報名參加</h2>
            <form id="form-rsvp" class="pixel-form">

                <div id="rsvp-step-1">
                    <div class="form-group">
                        <label data-i18n="label_side">您是哪一方的親友？</label>
                        <div class="radio-group">
                            <label><input type="radio" name="side" value="男方親友" required> <span
                                    data-i18n="side_groom">男方</span></label>
                            <label><input type="radio" name="side" value="女方親友"> <span
                                    data-i18n="side_bride">女方</span></label>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="pixel-btn sm nav-btn" data-target="sec-home"
                            data-i18n="btn_back">返回</button>
                        <button type="button" id="btn-next-step" class="pixel-btn primary"
                            data-i18n="btn_next">下一步</button>
                    </div>
                </div>

                <div id="rsvp-step-2" class="hidden">
                    <div class="form-group">
                        <label data-i18n="label_name">姓名</label>
                        <input type="text" id="rsvp-name" class="pixel-input" required>
                    </div>

                    <div class="form-group">
                        <label data-i18n="label_pax">參與人數</label>
                        <input type="number" id="rsvp-pax" class="pixel-input" min="1" value="1" required>
                    </div>

                    <div class="form-group">
                        <label data-i18n="label_diet">葷素選擇</label>

                        <div id="diet-single" class="radio-group">
                            <label><input type="radio" name="diet" value="葷食" checked> 🥩 葷食</label>
                            <label><input type="radio" name="diet" value="素食"> 🥗 素食</label>
                        </div>

                        <div id="diet-multiple" class="hidden">
                            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                                <label style="width: 80px; margin: 0;">🥩 葷食:</label>
                                <input type="number" id="diet-meat" class="pixel-input" min="0" value="1"
                                    style="width: 80px;"> 人
                            </div>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <label style="width: 80px; margin: 0;">🥗 素食:</label>
                                <input type="number" id="diet-veg" class="pixel-input" min="0" value="0"
                                    style="width: 80px;"> 人
                            </div>
                            <div id="diet-error" class="hidden"
                                style="color: #ff6b81; font-size: 0.85rem; margin-top: 5px;">
                                ⚠️ 葷食與素食人數總和必須等於參與總人數！
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label data-i18n="label_child">兒童座椅數量</label>
                        <input type="number" id="rsvp-child" class="pixel-input" min="0" value="0"
                            placeholder="不需要請填 0">
                    </div>

                    <div class="form-group">
                        <label data-i18n="label_note">備註/祝福</label>
                        <textarea id="rsvp-message" rows="2" class="pixel-input"
                            placeholder="有什麼特別需求或想說的話嗎？"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="btn-prev-step" class="pixel-btn sm" data-i18n="btn_prev">上一步</button>
                        <button type="submit" id="btn-submit-rsvp" class="pixel-btn primary"
                            data-i18n="btn_submit">確認送出</button>
                    </div>
                </div>

            </form>
        </section>

        <section id="sec-info" class="view-section hidden">
            <h2 data-i18n="title_info">🗺️ 婚宴資訊</h2>
            <div class="info-content">
                <p><strong data-i18n="info_date_label">📅 日期:</strong> <span data-i18n="info_date">2026/11/29 (日)</span>
                </p>
                <p><strong data-i18n="info_time_label">⏰ 時間:</strong> <span data-i18n="info_time">11:00 AM 進場</span></p>
                <p><strong data-i18n="info_venue_label">📍 地點:</strong> <span data-i18n="info_venue">玄饌海鮮宴會館</span></p>
                <p style="margin-top: 10px;">
                    <a href="https://maps.app.goo.gl/qjqtVKAnW3CYJFKL6" target="_blank" class="pixel-btn sm"
                        data-i18n="info_map_link" style="text-decoration: none; display: inline-block;">📍 開啟 Google
                        Maps</a>
                </p>

                <div class="pixel-box">
                    <h3 data-i18n="info_transport">🚗 交通方式</h3>
                    <ul>
                        <li data-i18n="info_hsr">🚄 高鐵：台南站下車，轉計程車約20-30分</li>
                        <li data-i18n="info_tra">🚆 台鐵：台南火車站，轉計程車約15分</li>
                    </ul>
                </div>

                <div class="pixel-box">
                    <h3 data-i18n="info_parking">🅿️ 停車場配置圖</h3>
                    <img id="parking-map-img" src="./TrafficInfo.png" alt="Parking Map"
                        style="width: 100%; border: 4px solid var(--border-color); margin-top: 10px;">
                </div>
            </div>
            <div class="form-actions" style="margin-top: 20px;">
                <button type="button" class="pixel-btn sm nav-btn" data-target="sec-home"
                    data-i18n="btn_back">返回</button>
            </div>
        </section>

        <section id="sec-wishes" class="view-section hidden">
            <h2 data-i18n="title_wishes">💌 留言祝福</h2>
            <form id="form-wish" class="pixel-form">

                <div class="form-group">
                    <label data-i18n="label_wish_name">你是誰 (姓名/暱稱)</label>
                    <input type="text" id="wish-name" class="pixel-input" data-i18n-placeholder="placeholder_wish_name"
                        placeholder="請輸入您的名字" required>
                </div>

                <div class="form-group" style="position: relative;">
                    <label data-i18n="label_wish_message">祝福的話語</label>
                    <textarea id="wish-message" rows="6" class="pixel-input rpg-textarea"
                        data-i18n-placeholder="placeholder_wish_message" placeholder="在這裡寫下對仁雲&銳芝的祝福吧..."
                        required></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="pixel-btn sm nav-btn" data-target="sec-home"
                        data-i18n="btn_back">返回</button>
                    <button type="submit" class="pixel-btn accent" data-i18n="btn_send_wish">送出祝福</button>
                </div>
            </form>
        </section>

        <section id="sec-photos" class="view-section hidden">
            <h2 data-i18n="title_photos">📷 婚紗特集</h2>
            
            <div id="carousel-wrapper" class="carousel-wrapper">
                <div class="carousel-container" id="carousel-touch-zone">
                    <div id="photos-container" class="carousel-track"></div>
                </div>
            </div>
            
            <div id="photos-empty-msg" class="pixel-box alert-box hidden">
                <p data-i18n="photos_coming_soon">🚧 功能開發中，敬請期待！</p>
            </div>

            <div class="form-actions" style="margin-top: 40px;">
                <button type="button" class="pixel-btn sm nav-btn" data-target="sec-home" data-i18n="btn_back">返回主選單</button>
            </div>
        </section>

        <div id="image-modal" class="modal hidden">
            <div class="modal-backdrop" id="modal-backdrop"></div>
            
            <span id="close-modal" class="close-btn">&times;</span>
            
            <div class="modal-content-wrapper" id="modal-touch-zone">
                <img id="enlarged-img" src="" alt="Enlarged Image">
            </div>
        </div>

    </main>

    <div id="image-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="close-modal" class="modal-close">X</div>
            <img id="enlarged-img" src="" alt="Enlarged Map">
        </div>
    </div>

    <div id="success-modal" class="modal-overlay hidden">
        <div class="modal-content" style="text-align: center; padding: 40px 30px;">
            <h2 style="color: #ff6b81; margin-bottom: 15px; font-size: 2rem;">🎉 報名成功！</h2>
            <p style="margin-bottom: 25px; font-size: 1.2rem;">感謝您的回覆，期待在婚禮上見到您！</p>
            <button id="btn-success-ok" class="pixel-btn primary">確認並回首頁</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
